# Server Configuration
server.port=8080

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:techloan;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
# ── Supabase PostgreSQL Database ─────────────────────────
# Set via environment variables: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/techloan}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT Configuration
app.jwt.secret=YOUR_JWT_SECRET_HERE
# ── JWT ──────────────────────────────────────────────────
# Set via environment variable: APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:change-me-in-production}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Institution
app.institutional.domain=cit.edu

# Google OAuth - Replace with your own credentials
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
# ── Supabase API ─────────────────────────────────────────
# Set via environment variables: APP_SUPABASE_URL, APP_SUPABASE_ANON_KEY
app.supabase.url=${APP_SUPABASE_URL:https://example.supabase.co}
app.supabase.anon-key=${APP_SUPABASE_ANON_KEY:your-anon-key}

# ── Google OAuth Configuration ──────────────────────────
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com