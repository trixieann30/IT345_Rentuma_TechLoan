# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Supabase PostgreSQL Database ─────────────────────────
# Set via environment variables: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/techloan}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── JWT ──────────────────────────────────────────────────
# Set via environment variable: APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:change-me-in-production}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── Institution ──────────────────────────────────────────
app.institutional.domain=cit.edu

# ── Supabase API ─────────────────────────────────────────
# Set via environment variables: APP_SUPABASE_URL, APP_SUPABASE_ANON_KEY
app.supabase.url=${APP_SUPABASE_URL:https://example.supabase.co}
app.supabase.anon-key=${APP_SUPABASE_ANON_KEY:your-anon-key}

# ── Google OAuth Configuration ──────────────────────────
# Set via environment variables: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
#                                SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
# Go to https://console.cloud.google.com and create OAuth 2.0 credentials
# Authorized redirect URIs: http://localhost:8080/api/auth/google/callback
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com